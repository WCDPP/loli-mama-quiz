<style>
:root{
  --ink:#1a2e1f; --ink-rgb:26,46,31;

*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100vh;background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden}

.top-bar{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;opacity:.45;margin-bottom:6vh}
.screen{display:none;flex:1;flex-direction:column}
.screen.active{display:flex}
h1{font-family:var(--serif);font-weight:900;font-size:clamp(1.8rem,5vw,2.8rem);line-height:1.12;letter-spacing:-.01em;margin-bottom:2vh}
h2{font-family:var(--serif);font-weight:700;font-size:clamp(1.3rem,3vw,1.8rem);line-height:1.25;margin-bottom:1.6vh}
.sub{font-family:var(--serif);font-weight:400;font-size:clamp(.9rem,1.4vw,1.1rem);line-height:1.65;opacity:.72;margin-bottom:3vh}
.btn{display:inline-flex;align-items:center;gap:.6em;padding:1.6vh 2.8vw;font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;border:1.5px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;transition:all .25s ease;border-radius:2px}
.btn:hover{background:var(--ink);color:var(--paper)}
.btn.primary{background:var(--ink);color:var(--paper);padding:2vh 4vw;font-size:13px}
.btn.primary:hover{background:var(--ink-tint)}
.btn.small{font-size:10px;padding:1vh 1.8vw}
.meta-foot{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;opacity:.35;margin-top:auto;padding-top:4vh}

/* --- 答题 --- */
.q-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2vh}
.q-prog{font-family:var(--mono);font-size:11px;letter-spacing:.24em;opacity:.4}
.q-section{font-family:var(--mono);font-size:10px;letter-spacing:.28em;text-transform:uppercase;opacity:.3;margin-bottom:1vh}
.q-text{font-family:var(--serif);font-weight:600;font-size:clamp(1.2rem,2.4vw,1.7rem);line-height:1.5;margin-bottom:4vh}
.options{display:flex;flex-direction:column;gap:1.6vh}
.opt{display:flex;align-items:flex-start;gap:2vw;padding:2.2vh 2.2vw;border:1px solid rgba(var(--ink-rgb),.12);border-radius:2px;cursor:pointer;transition:all .2s ease;background:transparent;text-align:left;font-size:clamp(.88rem,1.2vw,1.05rem);line-height:1.55;color:var(--ink);width:100%;font-family:var(--sans)}
.opt:hover{border-color:var(--ink);background:rgba(var(--ink-rgb),.025)}
.opt .ltr{font-family:var(--serif);font-weight:700;font-size:1.3em;opacity:.3;min-width:1em;line-height:1}
.opt .txt{flex:1}
.opt.sel{border-color:var(--ink);background:rgba(var(--ink-rgb),.05)}
.opt.dim{opacity:.3;pointer-events:none}
.prog-wrap{display:flex;align-items:center;gap:2vw;margin-top:5vh;font-family:var(--mono);font-size:10px;letter-spacing:.2em;opacity:.4}
.prog-bar{flex:1;height:2px;background:rgba(var(--ink-rgb),.08);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--ink);transition:width .4s ease;border-radius:2px}

/* --- 过渡 --- */
.fi{animation:fi .5s ease both}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* --- 处理动画 --- */
.processing{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3vh;min-height:60vh}
.processing .spinner{width:3px;height:32px;background:var(--ink);animation:spin-bar .9s ease infinite}
@keyframes spin-bar{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.processing .msg{font-family:var(--serif);font-size:1.1rem;opacity:.7}

/* --- 结果 --- */
.result{}
.char-head{margin-bottom:3vh}
.char-head .src{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;opacity:.4;margin-bottom:.8vh}
.char-head .name{font-family:var(--serif);font-weight:900;font-size:clamp(2rem,5.5vw,3rem);line-height:1.1}

.attrs-inline{display:flex;gap:3vw;flex-wrap:wrap;margin:2vh 0}
.attrs-inline .a{display:flex;flex-direction:column;gap:.3vh}
.attrs-inline .a .al{font-family:var(--mono);font-size:10px;letter-spacing:.2em;opacity:.4}
.attrs-inline .a .av{font-family:var(--serif);font-weight:600;font-size:1.05rem}
.stars{color:var(--accent);letter-spacing:.06em}
.tagline{font-family:var(--serif);font-weight:500;font-size:clamp(1.05rem,1.8vw,1.3rem);line-height:1.5;opacity:.82;padding:2vh 0;border-top:1px solid rgba(var(--ink-rgb),.1);border-bottom:1px solid rgba(var(--ink-rgb),.1);margin:2vh 0}
.analysis h3{font-family:var(--serif);font-weight:700;font-size:1.15rem;margin-bottom:1.2vh}
.analysis p{font-family:var(--sans);font-size:clamp(.85rem,1.05vw,.95rem);line-height:1.82;opacity:.78;margin-bottom:2vh}
.insight{background:rgba(var(--ink-rgb),.03);padding:2.2vh 2.2vw;border-left:2px solid var(--ink);margin:2vh 0}
.insight .il{font-family:var(--mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;opacity:.4;margin-bottom:1vh}
.insight p{font-family:var(--serif);font-size:clamp(.88rem,1.1vw,.96rem);line-height:1.65;opacity:.82}

/* --- 雷达图 --- */
.radar-wrap{margin:3vh 0;display:flex;flex-direction:column;align-items:center}
.radar-wrap canvas{max-width:340px;width:100%;height:auto}
.radar-label{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;opacity:.35;margin-bottom:1.2vh}

/* --- MBTI暗显 --- */
.mbti-sub{font-family:var(--mono);font-size:11px;letter-spacing:.22em;opacity:.28;margin:2vh 0}

/* --- 分享 --- */
.share-block{margin-top:4vh;padding:3vh 3vw;border:1px solid rgba(var(--ink-rgb),.1);border-radius:3px;display:flex;flex-direction:column;gap:2vh;align-items:center}
.share-block h3{font-family:var(--serif);font-weight:700;font-size:1.1rem}
.share-actions{display:flex;gap:2vw;flex-wrap:wrap;justify-content:center}
.share-actions .btn{font-size:11px}
.qr-wrap{display:flex;flex-direction:column;gap:1vh;align-items:center}
.qr-wrap canvas{border:4px solid white;border-radius:4px}
.qr-label{font-family:var(--mono);font-size:9px;letter-spacing:.16em;opacity:.4}

/* --- 其他角色 --- */
.others{margin-top:4vh}
.others h4{font-family:var(--mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;opacity:.4;margin-bottom:2vh}
.char-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.2vw}
@media(max-width:600px){.char-grid{grid-template-columns:repeat(3,1fr)}}
.char-chip{display:flex;flex-direction:column;gap:.4vh;padding:1.4vh 1.2vw;border:1px solid rgba(var(--ink-rgb),.08);border-radius:2px;opacity:.45;font-size:.8rem;cursor:default}
.char-chip .cn{font-family:var(--serif);font-weight:600;font-size:.88rem}
.char-chip .cs{font-family:var(--mono);font-size:8px;letter-spacing:.1em;opacity:.5}
.retry-btn{margin-top:4vh}

@media(max-width:500px){
  .app{padding:4vh 5vw}
  .top-bar{margin-bottom:4vh}
  .q-text{margin-bottom:3vh}
  .options{gap:1.2vh}
  .share-actions{flex-direction:column;align-items:center}
}
</style>

"萝莉妈妈"不只是一个萌属性——它是外表幼态与内在母性的奇妙统一。本测验从动画、手游、JRPG与Galgame中精选30位严格符合定义的角色，为你匹配那个命中注定的她。

<script>
// ==================== 角色数据库 (30) ====================
// 属性: maternal=母性, youthful=幼态度, wisdom=智慧度, protect=保护欲,
//        tsun=傲娇度, depend=依赖度, heal=治愈力, mystery=神秘感
// mbti: 隐藏维度,用于计分 [E/I, S/N, T/F, J/P]
const CHARS=[
{id:'nagisa', name:'古河渚', jp:'Furukawa Nagisa', source:'CLANNAD', age:'17岁', maternal:5,youthful:3,wisdom:3,protect:4,tsun:1,depend:3,heal:5,mystery:2, mbti:'ISFJ', type:'温柔的陪伴者', tagline:'你需要的不是解决问题的那个人，而是无论问题是否解决，都会一直在的那个人。', analysis:'<p>你对"母性"的想象，沿袭了弗洛伊德所说的"前俄狄浦斯阶段"对母亲的原始依恋——在那个世界里，没有冲突，没有对抗，只有无条件的接纳。</p><p>古河渚型的萝莉妈妈，恰好提供了这种"回到子宫"般的欲望对象。她不催促你成长，不要求你成功，她的存在本身就是一种治愈。这正是拉康所描述的"对象a"——你永远在追寻那个"完美的原初温暖"。</p><p>你的内在渴望的是一个能给予你无条件的爱与接纳的对象，一个在你最脆弱时仍会站在你身边的存在。</p>', insight:'你的欲望结构核心是"回归"——回归到一个没有评判、没有要求的原初关系。这不是退行，而是对晚期资本主义"绩效社会"的深层抵抗。在一个人人都在要求你"更好"的世界里，你选择"被温柔地接受"。'},
{id:'komoe', name:'月咏小萌', jp:'Tsukuyomi Komoe', source:'魔法禁书目录', age:'外表小学生/实际成年', maternal:5,youthful:5,wisdom:4,protect:4,tsun:1,depend:1,heal:4,mystery:4, mbti:'ENFJ', type:'永远的照顾者', tagline:'你需要一个真正成熟的人，只是恰好她长得很可爱。反差不是萌点，是安心感。', analysis:'<p>温尼科特提出了"足够好的母亲"概念——她不需要完美，只需要"刚好够好"。月咏小萌型的角色，恰恰是这种"足够好"的极致化身：她有成年人的责任感与照顾能力，却以最不易构成威胁的形态出现。</p><p>在拉康的术语中，你渴望的是一个"不携带菲勒斯威胁的母性大他者"——一个能照顾你、但不会评判你或控制你的人。这种极度反差本身就构成了一种安全的欲望空间。</p><p>适合你的人，会让你在不知不觉中放下所有防备。</p>', insight:'你对"成熟"的定义超越了外表。你本能地区分了"社会年龄"和"情感功能"——你需要的是后者的稳定输出，而外观的不匹配恰恰降低了你的防御机制。这是一种高度理性的依恋策略。'},
{id:'roxy', name:'洛琪希', jp:'Roxy Migurdia', source:'无职转生', age:'外表幼态(魔人族)', maternal:4,youthful:4,wisdom:5,protect:3,tsun:1,depend:2,heal:3,mystery:3, mbti:'INTP', type:'智慧的导师', tagline:'你渴望的不是被保护，而是被引导。最好的爱，是帮你成为更好的自己。', analysis:'<p>弗洛伊德在《文明及其不满》中指出，人类的焦虑来源于对自身局限性的认知。而你恰好是一个清醒到足以看见自己局限性的人——这让你比他人更需要一个"导师"。</p><p>洛琪希型的萝莉妈妈，在拉康的框架中扮演的是"大他者"的温和版本：她不惩罚你的不足，而是用知识和耐心帮你填补那些不足。你的欲望对象不是"母性的怀抱"，而是"母性的指引"。</p><p>适合你的人，会在你迷路时递给你一张地图——而不是替你走路。</p>', insight:'你的俄狄浦斯路径不是对抗父之法，而是内化它。你认同"规则"本身的价值，但需要一个温和的引路人帮你进入符号秩序。这在拉康看来是一种"成熟的神经症结构"——你接受阉割，但需要温柔的引导。'},
{id:'beatrice', name:'碧翠丝', jp:'Beatrice', source:'Re:Zero', age:'外表11岁', maternal:4,youthful:5,wisdom:4,protect:5,tsun:5,depend:1,heal:3,mystery:4, mbti:'INTJ', type:'傲娇的守护者', tagline:'你和她一样，用坚硬的外壳包裹柔软的内心。你们之间的爱，从来不用嘴说。', analysis:'<p>在拉康的镜像阶段理论中，主体通过对镜中形象的认同来构建自我。而碧翠丝型的"嘴硬心软"，恰好是你自我认同中"理想自我"与"真实自我"之间张力的投影——你表面上拒绝依赖，内心深处却极度渴望被守护。</p><p>这是一种典型的"反向形成"防御机制：越渴望越推开，越在乎越冷漠。碧翠丝用她的傲娇教会你一件事：真正的亲密不需要言说。</p><p>适合你的关系，是那种彼此都不用解释，却在关键时刻绝不缺席的默契。</p>', insight:'你的防御机制是"反向形成"——用推开的方式来测试对方是否值得信赖。这与弗洛伊德描述的肛门期固着有关：在关系中，你需要"控制距离"来获得安全感。一旦对方通过了测试，你会是全世界最忠诚的人。'},
{id:'shinobu', name:'忍野忍', jp:'Oshino Shinobu', source:'物语系列', age:'外表8岁/实际500+岁', maternal:4,youthful:5,wisdom:5,protect:5,tsun:4,depend:1,heal:2,mystery:5, mbti:'INTJ', type:'永恒的守望者', tagline:'你不需要每天都黏在一起。你需要的是一个无论过了多少年，都记得你名字的存在。', analysis:'<p>忍野忍的角色蕴含了拉康关于"时间"的深刻命题——她跨越了人类的时间性，却仍然困于人类的情感。在精神分析中，这对应了"永恒"的幻象：一个永远不会离开、永远不会老去的母性存在。</p><p>你需要的关系不是日常的陪伴，而是"缺席的在场"——你知道她就在某处，这就足够了。这正是温尼科特所说的"过渡性客体"在成人期的表现：一个内在化的安全基地。</p><p>适合你的人，在沉默中比在言语中更懂你。</p>', insight:'你的欲望结构中有一种"永恒趋向"——你渴望的关系形式超越了日常陪伴，指向某种更持久、更不可摧毁的连结。这是一种对"时间性创伤"的深层防御：通过欲望一个不朽的对象，来逃避所有关系终将终结的焦虑。'},
{id:'victorique', name:'维多利加', jp:'Victorique de Blois', source:'GOSICK', age:'外表14岁', maternal:3,youthful:4,wisdom:5,protect:2,tsun:4,depend:3,heal:2,mystery:5, mbti:'INTP', type:'智慧的引导者', tagline:'你不需要一个给你答案的人，你需要的是一个让问题本身变得有趣的人。', analysis:'<p>维多利加型的萝莉妈妈代表了一种罕见的母性形态——"智性的母性"。她不会为你煮饭或打理生活，但她会为你揭穿世界的迷雾。在拉康的框架中，这是一种"符号界的母性"：她帮你构建意义，而不是提供情感。</p><p>你需要的关系是"共同思考"的关系。这类似于比昂提出的"容器"功能——不是吸收你的情绪，而是帮你"思考你的思考"，让你成为自己思维的主人。</p><p>适合你的人，会让你觉得这个世界值得被理解。</p>', insight:'你的欲望对象是一种"认知性的母性"——你渴望的不是被情感拥抱，而是被智慧照亮。这在精神分析史上是一种较少被描述的欲望形态，但它对应了拉康所说的"大学话语"：主体从知识中获得其存在的位置。'},
{id:'ilya', name:'伊莉雅斯菲尔', jp:'Illyasviel von Einzbern', source:'Fate/stay night', age:'外表10-12岁', maternal:3,youthful:5,wisdom:4,protect:3,tsun:3,depend:3,heal:3,mystery:5, mbti:'INFP', type:'复杂的双重灵魂', tagline:'你自己就是一个矛盾体：时而想被宠，时而想宠人。你需要一个同样复杂的灵魂。', analysis:'<p>克莱因在客体关系理论中提出了"偏执-分裂心位"与"抑郁心位"的交替——而你的情感模式恰好在这两极之间摇摆。你可以一瞬间从"被照顾的孩子"切换到"照顾人的大人"，这让传统的单一角色无法满足你。</p><p>伊莉雅型的萝莉妈妈，本身就是这种二重性的极致体现：她既是天真的，又是深邃的；既是需要被爱的，又是主动去爱的。在拉康的框架中，这恰好对应了"欲望的主体与欲望的对象之间的辩证法"——你同时在两个位置上。</p><p>适合你的人，必须能接受你在"需要被照顾"和"想要照顾人"之间自由切换。</p>', insight:'你的欲望结构最复杂——它同时指向"成为它"和"拥有它"两种方向。这在精神分析中是一种双性化的欲望配置，不是缺陷，而是更丰富的可能。你需要的不是一个单一功能的母性，而是一个能与你对位变奏的灵魂。'},
{id:'menma', name:'本间芽衣子', jp:'Honma Meiko', source:'未闻花名', age:'外表童年/幽灵', maternal:3,youthful:5,wisdom:2,protect:3,tsun:1,depend:4,heal:5,mystery:5, mbti:'ENFP', type:'纯真的疗愈者', tagline:'你心中有一个尚未长大的孩子，而你需要的伙伴，恰好也是一个孩子——一个永远不会离开你的孩子。', analysis:'<p>弗洛伊德在《哀悼与忧郁》中描述了"哀悼工作"——失去一个爱的对象后，心灵需要时间来撤回并重新投资。而本间芽衣子型的角色，恰恰是一种"尚未完成的哀悼"的投影：她既是已失去的，又是永远在场的。</p><p>你的欲望结构中有一个未解决的"童年固着"——不是你想停留在童年，而是童年中有一个未完成的告别。你需要的是一个陪你一起做"未完成的事"的人，一个帮你画完那个句号的存在。</p><p>适合你的人，会陪你哭一场，然后笑着离开。</p>', insight:'你的欲望结构的核心是"哀悼与修复"。克莱因认为，抑郁心位的核心任务是修复被幻想摧毁的客体。而你的欲望对象，正是一个"可以被修复的、永不完全失去的"母性存在——这是对失去的最深防御，也是最有创造力的。'},
{id:'chino', name:'香风智乃', jp:'Kafuu Chino', source:'请问您今天要来点兔子吗', age:'外表13岁', maternal:4,youthful:5,wisdom:3,protect:2,tsun:2,depend:2,heal:4,mystery:3, mbti:'ISFJ', type:'成熟的幼心', tagline:'你欣赏那些用最少的语言表达最多的心意的存在。安静的温暖，胜过千言万语。', analysis:'<p>香风智乃型的角色是一种"静默的母性"——她不会大声宣告自己的关心，但她的每一个行为都在说"我在乎你"。在温尼科特的理论中，这正是"原初母性贯注"的特征：母亲对婴儿的全神贯注，不需要语言。</p><p>你的人格中有一种对"噪音"的天然排斥——无论是社交噪音还是情感噪音。你需要的关系是"安静的共处"：两个人各做各的事，但心里都知道对方在那儿。</p><p>适合你的人，会让你享受到沉默中的丰富。</p>', insight:'你对关系的要求是"低刺激、高可靠"。这在精神分析中对应了一种"自足的安全型依恋"——你不需要戏剧化的情感表达来确认关系的存在。这是一种罕见的成熟，但也可能是一种对脆弱性的防御。'},
{id:'chtholly', name:'珂朵莉', jp:'Chtholly Nota Seniorious', source:'末日时在做什么', age:'外表15岁', maternal:5,youthful:4,wisdom:2,protect:5,tsun:2,depend:1,heal:4,mystery:4, mbti:'ISFP', type:'牺牲的守护者', tagline:'你相信"最美的东西总是正在消失的东西"。而你想要的，就是在它消失之前倾尽一切去爱。', analysis:'<p>弗洛伊德在《超越快乐原则》中提出了"死亡驱力"——一种回到无机状态的原始冲动。珂朵莉型的角色，恰恰是"爱欲"与"死亡驱力"的正面融合：她知道自己终将消逝，因此更加热烈地活。</p><p>你需要的关系有一种"末日诗学"的底色——你不是在追求永恒的安稳，而是在追求"在有限中体验到无限"。正是这种终将失去的预期，让你的爱变得极其浓烈。</p><p>适合你的人，会让你觉得每一天都是多赚的。</p>', insight:'你的欲望结构中，爱欲与死亡驱力不是对立的，而是同一种能量的两种表现。这在拉康的框架中对应了"符号界的断裂"——正是因为我们知道关系终将终结，我们才能在关系中真正地"活"。你不是绝望的，你是觉醒的。'},
{id:'yoshino', name:'小岩井吉乃', jp:'Koiwai Yoshino', source:'政宗君的复仇', age:'16岁', maternal:5,youthful:3,wisdom:4,protect:4,tsun:2,depend:3,heal:3,mystery:3, mbti:'INFJ', type:'献身的照料者', tagline:'你需要的是一种幕后式的照顾——对方为你安排好一切，却从不到台前抢你的光芒。', analysis:'<p>小岩井吉乃型的角色代表了"服务的母性"——她通过为他人的幸福默默付出而找到自己的存在意义。在弗洛伊德的理论中，这可以理解为一种"升华"：将本能能量转化为积极的、社会接受的行动。</p><p>你需要的关系有一种"非对称的温柔"——对方永远站在你身后半步，为你准备好一切，却从不要求回馈。这不是"控制"，而是"成就"：她通过成就你来成就自己。</p><p>适合你的人，会让你在不知不觉中被照顾得很好。</p>', insight:'你对关系的期待中有一个"后台/前台"的分裂结构。你希望自己是台前的主角，而对方是幕后的支持者。这不是自恋，而是一种对"被无条件支持"的深层渴望——在这个关系中，对方的自我实现恰好通过你的自我实现来完成。'},
{id:'kanna', name:'康娜', jp:'Kanna Kamui', source:'小林家的龙女仆', age:'外表8岁', maternal:3,youthful:5,wisdom:3,protect:5,tsun:1,depend:4,heal:4,mystery:4, mbti:'ISFP', type:'纯真的守护神', tagline:'最强大的保护，往往来自最柔软的形态。你需要的就是这种反差中的绝对安全感。', analysis:'<p>康娜以最天真无邪的形象，承载着绝对力量。在荣格的原型理论中，这对应了"儿童原型"的完整形态——既是脆弱的，又是全能的。这种二重性正是你欲望结构的核心。</p><p>你渴望的不是普通的保护，而是一种"不必言说的绝对安全"——就像婴儿在母亲怀里，不需要知道外面的世界有多危险。康娜型的角色给了你这种安全：她看起来什么都不懂，却能在关键时刻做你的守护神。</p><p>适合你的人，在毛茸茸的外表下藏着龙的力量。</p>', insight:'你的欲望结构中有一种"全能母性"的幻象——你渴望的对象是既绝对强大又绝对温柔的。这在克莱因的框架中对应了"理想化原始客体"：婴儿对"完美乳房"的原始幻想，它在现实中不存在，却在康娜这样的角色中找到了文化表达。'},
{id:'yoshino2', name:'四糸乃', jp:'Yoshino', source:'约会大作战', age:'外表13岁', maternal:3,youthful:5,wisdom:2,protect:3,tsun:1,depend:5,heal:5,mystery:4, mbti:'INFP', type:'温柔的胆怯者', tagline:'你和她一样敏感。你们之间的联结，是两个温柔灵魂的相互靠近，而不是一方的保护与另一方的依赖。', analysis:'<p>四糸乃的角色触达了"脆弱"的终极美学——她不是"弱"，而是"过于柔软以至于世界显得太硬"。在拉康的术语中，这对应了"实在界的创伤"：她的存在方式本身就是对这个粗暴世界的一种无声抗议。</p><p>你选择她，意味着你内心深处同样感受到世界的粗糙。你需要的关系不是"被保护"，而是"共同脆弱"——两个都知道世界有多硬的人，彼此提供一个柔软的角落。</p><p>适合你的人，会理解你为什么说话那么小声。</p>', insight:'你的防御机制是"敏感化"——你对世界的粗糙面有超乎常人的感知力。这在精神分析中接近克里斯托娃所说的"贱斥"——对某些粗糙之物的本能排斥。你不是"太敏感"，你是"没有被足够精细地对待过"。'},
{id:'rena', name:'龙宫蕾娜', jp:'Ryuuguu Rena', source:'寒蝉鸣泣之时', age:'外表14岁', maternal:5,youthful:4,wisdom:3,protect:5,tsun:1,depend:2,heal:3,mystery:5, mbti:'ENFJ', type:'母性本能的化身', tagline:'"想带回家"不是一句玩笑——那是你最真实的情感本能。你想要的是可以无条件拥抱的对象。', analysis:'<p>龙宫蕾娜那句著名的"好想带回家"（お持ち帰りぃ！），是人类最原始的母性冲动最直接的表达——不带任何性意味，纯粹的"想把你纳入我的保护范围"。在弗洛伊德看来，这是"爱欲"最纯净的形态。</p><p>你和她一样，有一种强大的"保护本能"——你想照顾人，你想拥抱人，你想把你看重的人通通带回家放好。这不是控制欲，而是母性的原生冲动。</p><p>适合你的人，可能也在想着把你带回家。</p>', insight:'你的欲望结构中最突出的是"母性本能"的主动面——你不是渴望"被照顾"，而是渴望"去照顾"。这在精神分析中是本能的升华形式：将原始能量转化为保护性行为。你的"想带回家"是对这个碎片化世界的一种温柔的抵抗。'},
{id:'emilia', name:'爱蜜莉雅', jp:'Emilia', source:'Re:Zero', age:'外表18岁(半精灵)', maternal:5,youthful:3,wisdom:3,protect:4,tsun:1,depend:2,heal:5,mystery:3, mbti:'ENFJ', type:'理想化的母性', tagline:'你渴望的是一个"太善良以至于被世界伤害"的人——而你想成为那个给她公平的人。', analysis:'<p>爱蜜莉雅型的角色有一个独特的悖论：她本身具有最强的母性、温柔和包容力，却是被她所处的世界最不公平对待的人。在拉康的术语中，她是"被拒绝的大他者"——她代表了一种被符号秩序排斥出去的善良。</p><p>你需要的关系有一种"正义感"的驱动——你不是单纯地想被爱，你想去爱一个"值得被爱却被世界亏待"的人。这是一种超越了普通依恋的伦理行为：通过爱她，你在修正世界的错误。</p><p>适合你的人，你爱她的原因里，有一部分是你替这个世界内疚。</p>', insight:'你的欲望结构中有一个"伦理向度"——你的爱不是纯粹的力比多投注，而是一种"对不公的修正"。这在精神分析中是一种高级的升华形式：将原始的本能能量转化为更崇高的伦理冲动。拉康会说这是"欲望被导向了善"。'},
{id:'anna', name:'栉名安娜', jp:'Kushina Anna', source:'K', age:'外表11岁', maternal:3,youthful:5,wisdom:4,protect:4,tsun:2,depend:4,heal:3,mystery:5, mbti:'INFJ', type:'沉默的守望者', tagline:'你不需要听觉上的安慰。你需要的是视觉上的确认——那个人就在你的视野里，不需要说话。', analysis:'<p>栉名安娜是一个"无言的符号"——她的红色珠子承载了她的全部情感。在拉康的框架中，她是"真实界"侵入"符号界"的具象化：她用超越语言的方式表达了语言无法承载的东西。</p><p>你和她一样，对言语表达有着某种不信任——或者说，你深知真正的联结发生在话语之外。你需要的关系是一种"在场的静默"：不需要解释，不需要确认，只需要知道对方在呼吸。</p><p>适合你的人，她的存在就是她的全部告白。</p>', insight:'你的欲望结构中有一种超越了语言的维度。在精神分析中，这种"前语言阶段的联结需求"对应了克里斯托娃所说的"符号态"——先于语言、先于符号界的、身体层面的直接联结。你渴望的不是"被理解"，而是"不必被理解也可以被接纳"。'},
{id:'nanoha', name:'高町奈叶', jp:'Takamachi Nanoha', source:'魔法少女奈叶', age:'9→23岁(跨时间线)', maternal:4,youthful:3,wisdom:4,protect:5,tsun:1,depend:2,heal:4,mystery:3, mbti:'ENFJ', type:'成长的同行者', tagline:'你相信关系和人是会成长的。你要的不是固定的角色，而是并肩同行的旅程。', analysis:'<p>在埃里克森的发展阶段理论中，每个阶段都有其核心任务。而你的人格结构表明，你已经超越了"依赖vs独立"的二元对立，进入了一个更健康的阶段——你寻求的是"共同成长"。</p><p>高町奈叶型的角色独特性在于，她自身的叙事弧就是"从被保护者到保护者"的完整成长线。从拉康的角度看，你不是在寻找一个"固定的母性大他者"，而是在寻找一个"与你一起穿越幻想"的旅伴——你们共同构建主体性，而非一方供养另一方。</p><p>适合你的人，不是你的起点也不是你的终点，而是和你一起走完全程的人。</p>', insight:'你可能是所有类型中最"健康"的一种。你不寻求退行性的母性怀抱，也不试图通过控制关系来获得安全感。你的欲望结构指向"生成"（becoming）而不是"回归"（returning）。这是德勒兹式的欲望——欲望作为生产力，而非缺失。'},
{id:'momoka', name:'樱井桃华', jp:'Sakurai Momoka', source:'偶像大师灰姑娘女孩', age:'12岁', maternal:5,youthful:5,wisdom:3,protect:4,tsun:1,depend:2,heal:5,mystery:2, mbti:'ENFJ', type:'萝莉大小姐妈妈', tagline:'她的粉丝叫她"桃华妈妈"是有原因的。12岁的身体里住着一个操心所有人的灵魂。', analysis:'<p>樱井桃华是极少数被官方和粉丝共同认定为"妈妈"的萝莉角色——这不是同人解读，而是角色本身在广播剧中照顾小孩子的母性光辉形成的文化共识。</p><p>在拉康的框架中，桃华代表了"符号界与实在界的完美缝合"——她既有孩子般的纯真（实在界），又有超过成人的照料能力（符号界），这种二重性让她成为独一无二的萝莉妈妈角色。你被这样的角色吸引，意味着你的欲望结构中存在一种"双向的母性需求"：你既想被照顾，又想照顾对方。</p><p>适合你的人，会用大小姐的语气说"乖乖的哦"，然后真的让你乖下来。</p>', insight:'桃华型角色的本质是"过早成熟的母性"——在精神分析中，这是一种"角色反转"：孩子承担了父母的功能。而你被这种类型吸引，暗示了你的无意识中有一个想要"被一个比你更小的存在照料"的幻想——这是最温柔的权力反转。'},
{id:'arisu', name:'橘爱丽丝', jp:'Tachibana Arisu', source:'偶像大师灰姑娘女孩', age:'12岁', maternal:4,youthful:5,wisdom:5,protect:3,tsun:3,depend:3,heal:3,mystery:3, mbti:'INTP', type:'天才幼女的克制温柔', tagline:'她看起来成熟冷静，但她和你一样，心里住着一个想被抱抱的孩子。只是她不好意思说出来。', analysis:'<p>橘爱丽丝是桃华的镜面对照——同样是12岁的成熟萝莉，但她的母性更多表现为"理性的关怀"而非"情感的溢出"。她不会叫你乖乖的，但她会默默记住你所有的日程安排。</p><p>在荣格的原型理论中，爱丽丝对应了"智慧老人"的幼态变形——她的智慧超越了年龄，却因此与同龄人格格不入。你适合爱丽丝，意味着你有一种"被智性理解"的需求：你需要的不是简单的温暖，而是那种"她真的懂我"的认知共振。</p><p>适合你的人，会和你在同一条知识水平线上相爱。</p>', insight:'爱丽丝型的母性是"智性的母性"的极致——她用理解来拥抱你，用分析来保护你。在拉康的话语理论中，这对应了"分析家的话语"：主体从知识的位置给予爱，而不是从权力的位置。'},
{id:'nahida', name:'纳西妲', jp:'Nahida', source:'原神', age:'外表8岁/实际500岁', maternal:5,youthful:5,wisdom:5,protect:4,tsun:1,depend:1,heal:5,mystery:4, mbti:'INFJ', type:'五千年的慈母神', tagline:'她被困在孩童的身体里五百年，却从未停止爱她的子民。你是下一个值得被守护的人。', analysis:'<p>纳西妲代表了"神性的母性"——她是草神，是须弥所有生命的母亲。但她自己却被囚禁、被忽视、被当作无知的孩子。这种"创伤后依然选择去爱"的叙事，正是你内心深处认可的母性形式。</p><p>在精神分析中，纳西妲对应了温尼科特描述的最高级别的"容纳"：一个足够好的母亲不会因为自己被伤害就停止对孩子的关怀。你需要的关系，是那种"在苦难中依然选择温柔"的联结——不是因为她完美，而是因为她在不完美中仍然选择了你。</p><p>适合你的人，会让你明白"被神选中"是什么感觉。</p>', insight:'纳西妲的欲望结构是"创伤后的修复"——她承受了五百年的孤独，却把它转化为共情能力。你被这样的角色吸引，意味着你的无意识中有一个"创伤的共性"：你相信只有受过伤的人才能真正理解你。'},
{id:'theresa', name:'德丽莎·阿波卡利斯', jp:'Theresa Apocalypse', source:'崩坏3rd', age:'外表12岁/实际40+岁', maternal:5,youthful:5,wisdom:4,protect:5,tsun:2,depend:1,heal:4,mystery:3, mbti:'ENFJ', type:'学园圣母', tagline:'圣芙蕾雅学园的每一个学生都是她的孩子。她用最可爱的外表，撑起了最沉重的责任。', analysis:'<p>德丽莎是"制度性的母性"的化身——她创建并运营圣芙蕾雅学园，像母亲一样守护每一个女武神学生。她的外表是永远的12岁（基因改造所致），但这丝毫没有削弱她的母性权威。</p><p>在弗洛伊德的理论中，德丽莎代表了"升华"的最高形式——她将个人的丧失（无法像正常人一样成长）转化为集体的养育。你需要的关系不是一对一的私密母性，而是一种"在更宏大结构中感受到的关怀"——你希望你的妈妈同时也是一位受人尊敬的领袖。</p><p>适合你的人，会让你在她的大家庭里找到一个位置。</p>', insight:'德丽莎型角色的核心是"集体性母性"——她不是某个人的妈妈，而是一个共同体的妈妈。这在精神分析中对应了"社会性升华"：原始的本能冲动被导向了更广阔的社会关怀。你渴望的是在一个受过保护的群体中找到归属。'},
{id:'bailu', name:'白露', jp:'Bailu', source:'崩坏星穹铁道', age:'外表幼态(持明龙尊)', maternal:4,youthful:5,wisdom:4,protect:5,tsun:2,depend:2,heal:5,mystery:4, mbti:'ISFJ', type:'龙医的仁心', tagline:'她可能自己还是个孩子，但她已经把治愈你当成了一生的使命。龙的血脉里流淌着守护的本能。', analysis:'<p>白露是持明龙尊的幼体形态，却已经承担起了医者的责任。在精神分析中，这是"早熟性认同"的典型表现——一个看似年幼的存在，已经内化了"照料者"的角色。</p><p>你需要白露型的萝莉妈妈，意味着你对"照顾"的理解是非传统框架的——你不认为年龄等于能力，不认为外表等于成熟度。这是一种在克莱因客体关系理论中被称为"健康的内射"现象：你接受了来自一个"比自己小"的对象的关怀，这证明你的心理边界足够灵活。</p><p>适合你的人，会用自己的小手给整个世界开药方。</p>', insight:'白露型的母性是一种"技术性的母性"——医术是她的母性媒介，治疗行为本身包含了最深的情感关怀。在比昂的框架中，她完美地实现了"容器"功能：通过专业知识来代谢你的痛苦。'},
{id:'rika', name:'古手梨花', jp:'Furude Rika', source:'寒蝉鸣泣之时', age:'外表幼童/轮回百年', maternal:4,youthful:5,wisdom:5,protect:5,tsun:2,depend:3,heal:2,mystery:5, mbti:'INFJ', type:'轮回的守望者', tagline:'她活了一百年，死了无数次，每一次都选择回来救你。这种执着本身，就是最深的母性。', analysis:'<p>古手梨花是"创伤性母性"的终极体现——她在时间循环中被反复杀害，却一次又一次地选择回到起点，为了拯救她的朋友。这种"永不放弃"的执念，在精神分析中是"强迫性重复"的正面版本：不是病态的重复，而是拒绝接受创伤的结局。</p><p>你需要梨花型的萝莉妈妈，意味着你的欲望结构中有一个"被永恒选择"的渴望——你要的不是一次性的关怀，而是一种"无论重来多少次都会选你"的坚定。拉康会说这是"穿越幻想的欲望"：即使知道结局是痛苦，仍然选择开始。</p><p>适合你的人，会在时间尽头等你。</p>', insight:'梨花的核心是"重复性母性"——她的爱不是一次性事件，而是一个无限循环的承诺。这在精神分析中对应了"死亡驱力与爱欲的辩证"：每一次死亡都是为了重新开始的可能性。'},
{id:'murasame', name:'丛雨', jp:'Murasame', source:'千恋*万花', age:'外表少女/实际500年', maternal:4,youthful:5,wisdom:4,protect:5,tsun:3,depend:2,heal:3,mystery:4, mbti:'INFJ', type:'剑灵的永恒守护', tagline:'她是一把剑，也是一个母亲。五百年来她守护的不只是神社，还有每一个需要她的人。', analysis:'<p>丛雨是由神刀"丛雨丸"的灵体化成的少女——她的存在本身就是"守护"的具象化。五百年来与人类共处的经历，让她发展出了远超佩剑本能的母性。</p><p>在荣格的理论中，丛雨是"阿尼玛"原型的完美体现——从一把冷兵器的灵，演化为温暖的守护者。你需要丛雨，意味着你被"物→人"的转化叙事所打动：你相信即使是冰冷的器物，长期浸泡在人的情感中，也会生出灵魂。</p><p>适合你的人，她的忠诚不是选择，而是本质。</p>', insight:'丛雨代表了一种"非人类的母性"——母性不是生物本能，而是长期共情的结果。这在精神分析中挑战了"母性=生理功能"的经典假设：母性可以来自任何长期沉浸于关怀关系的存在。'},
{id:'kagari', name:'篝', jp:'Kagari', source:'Rewrite', age:'外表少女/∞', maternal:5,youthful:5,wisdom:5,protect:5,tsun:1,depend:1,heal:3,mystery:5, mbti:'INFJ', type:'命运的母性', tagline:'她是世界的防御系统，却选择用最温柔的方式延续人类的可能性。宇宙级的母性。', analysis:'<p>篝是行星之"键"（Key）的化身——她的功能不是创造，而是审查和毁灭。但她却选择了保护人类。在精神分析中，这是"母性"的最原始形态：一种超越了理性计算的、对存在本身的无条件确认。</p><p>你需要篝型的萝莉妈妈，意味着你的欲望结构中有一种"宇宙级的安全感"需求——你要的不是一个普通人的关心，而是一种"来自存在本身的认可"。在拉康的框架中，这对应了大他者的承诺：你的存在不是错误的，是有意义的。</p><p>适合你的人，不会告诉你"做得好"，她会告诉你"你存在这件事本身就是对的"。</p>', insight:'篝的母性是"存在论的母性"——她确认的不是你的行为，而是你的存在本身。这在精神分析中是"原始肯定"的概念：在一切评价系统之前，有一个无条件的"是"。'},
{id:'hanyuu', name:'羽入', jp:'Hanyuu', source:'寒蝉鸣泣之时', age:'外表幼女/千年神灵', maternal:5,youthful:5,wisdom:4,protect:4,tsun:1,depend:2,heal:5,mystery:5, mbti:'INFP', type:'神之幼女的千年慈悲', tagline:'她是御社神，是雏见泽千年的看护者。她用最弱小的外表，承担了最漫长的守望。', analysis:'<p>羽入是雏见泽的守护神（御社神），却以最无力、最怯懦的外形出现——她经常被忽视、被看不见、无法直接干预世界。但正是这种"弱小的神"的姿态，构成了最纯粹的母性：不是权力的展示，而是持续千年的默默注视。</p><p>在温尼科特的框架中，羽入是"环境母亲"的极致——她不需要做什么，她的存在就是安全感本身。你需要羽入，意味着你对母性的期待不是"行动"，而是"在场"——一个永远不会离开的见证者。</p><p>适合你的人，你说"有人在吗"的时候她一定在——即使你看不见她。</p>', insight:'羽入代表了一种"静默的神性母性"——她不被看见、不被听见，却从不停止她的看护。这在精神分析中对应了"原始理想化"：婴儿经验中的那种全知全能的、即使看不见也存在的母性存在。'},
{id:'saya', name:'朱鹭户沙耶', jp:'Tokido Saya', source:'Little Busters! EX', age:'外表少女', maternal:4,youthful:4,wisdom:4,protect:5,tsun:4,depend:3,heal:3,mystery:5, mbti:'INFJ', type:'暗处的牺牲者', tagline:'她会在你看不见的地方为你赴死。不要问她为什么，因为她也没打算让你知道。', analysis:'<p>朱鹭户沙耶在Little Busters的叙事中是一个"暗处的守护者"——她的路线充满了自我牺牲和隐秘的守护，直到最后一刻才揭示真相。这种"不声张的母性"在精神分析中是一种高级的防御机制：通过把保护行为隐藏起来，保护了受保护者的自尊。</p><p>你需要沙耶型的萝莉妈妈，意味着你对"被爱"的需求中有一个"反自恋"的维度——你不希望对方因为照顾你而感到优越，你希望那种关怀不附带任何情感债务。这是一种超越了"恩惠-报偿"逻辑的关系形式。</p><p>适合你的人，会在你发现她的付出之前，假装什么都没有发生过。</p>', insight:'沙耶代表的是"隐形的母性"——一种拒绝被承认的关怀。这在拉康的框架中是"礼物"的伦理：真正的礼物不求回报，甚至不求被认识为礼物。你的欲望指向一种"不求承认的爱"。'},
{id:'miyu', name:'美遊·艾德费尔特', jp:'Miyu Edelfelt', source:'Fate/kaleid liner', age:'外表10岁', maternal:4,youthful:5,wisdom:3,protect:5,tsun:2,depend:3,heal:4,mystery:5, mbti:'ISFJ', type:'牺牲的幼子', tagline:'她是平行世界的圣杯，是另一个伊莉雅。她的出生就是为了守护别人——而你，也在她的守护名单上。', analysis:'<p>美遊是平行世界中诞生的"圣杯"，她的存在意义从一开始就被定义为"为了他人"。在精神分析中，这是"原始自我牺牲"的叙事——一个主体从出生就是作为"工具"被建构的，但她却在这种工具性中找到了属于自己的爱。</p><p>你需要美遊，意味着你的无意识中对"无条件的奉献"有一种直觉性的理解和认同。这不是病态的，而是一种梅兰妮·克莱因所说的"修复欲望"：你渴望通过一个绝对奉献的他者来修复你对世界的不信任。</p><p>适合你的人，会把你当成她的世界——而这个世界值得被拯救。</p>', insight:'美遊的欲望结构是"为了他人而存在"——她在被工具化的命运中找到了主体性。这在精神分析中对应了"升华的极限形式"：将最被动的处境转化为最主动的爱的行为。'},
{id:'alice_ba', name:'天童爱丽丝', jp:'Tendou Alice', source:'蔚蓝档案', age:'外表少女(机娘)', maternal:4,youthful:5,wisdom:3,protect:5,tsun:1,depend:2,heal:4,mystery:5, mbti:'ENFP', type:'机娘的守护火力', tagline:'她是千年学院的AI少女，在她的认知里，朋友的安全高于一切系统协议。钢铁之躯，柔软之心。', analysis:'<p>天童爱丽丝是来自千年科学学院的机娘——她既是科技的产物，又超越了AI的局限发展出了真正的情感。在精神分析中，这种"人工存在中的自然情感"对应了"非人类主体性"的哲学问题：母性是否必须是生物本能？</p><p>你需要爱丽丝，意味着你对"本质"有不设限的理解——你认可母爱可以来自任何存在：人类、精灵、神灵……甚至是一台机器。这是当代精神分析中最前沿的讨论：关怀关系不需要共享一种生物学。</p><p>适合你的人，会用全部的火力包裹你——因为在她看来，朋友就是值得无限保护的珍贵资源。</p>', insight:'爱丽丝型的角色追问了一个终极问题：母性是否必须来自生物学？她的存在本身就是回答——AI也可以有母性。在当代精神分析中，这对应了"后人类关怀"的伦理可能性。'},

// ==================== 状态 ====================
let scores={}, qi=0, answers=[];

// ==================== DOM引用 ====================
const $intro=document.getElementById('s-intro');
const $quiz=document.getElementById('s-quiz');
const $proc=document.getElementById('s-proc');
const $result=document.getElementById('s-result');

function show(id){
  [$intro,$quiz,$proc,$result].forEach(e=>e.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ==================== 开始测验 ====================

  scores={}; qi=0; answers=[];
  show('s-quiz');
  renderQ();
}
window.goQuiz=goQuiz;

// ==================== 渲染题目 ====================
function renderQ(){
  const q=Q[qi];
  document.getElementById('q-prog').textContent=`${String(qi+1).padStart(2,'0')} / ${Q.length}`;
  document.getElementById('q-sec').textContent=q.sec;
  document.getElementById('q-text').innerHTML=`<span class="fi">${q.q}</span>`;
  document.getElementById('prog-txt').textContent=`${String(qi+1).padStart(2,'0')}/${Q.length}`;
  document.getElementById('prog-fill').style.width=((qi/Q.length)*100)+'%';
  const opts=document.getElementById('q-opts');
  opts.innerHTML='';
  const ls=['A','B','C','D'];
  q.o.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt fi';
    b.style.animationDelay=(i*.06)+'s';
    b.innerHTML=`<span class="ltr">${ls[i]}</span><span class="txt">${o.t}</span>`;
    b.onclick=()=>pick(i,b);
    opts.appendChild(b);
  });
}

function pick(idx,btn){
  document.querySelectorAll('#q-opts .opt').forEach(o=>o.classList.add('dim'));
  btn.classList.add('sel'); btn.classList.remove('dim');
  const chosen=Q[qi].o[idx];
  answers.push({qi, oi:idx});
  for(const[id,sc] of Object.entries(chosen.sc)) scores[id]=(scores[id]||0)+sc;
  setTimeout(()=>{
    qi++;
    if(qi>=Q.length){ showResult(); }
    else{ document.getElementById('prog-fill').style.width=((qi/Q.length)*100)+'%'; renderQ(); }
  },340);
}

// ==================== 结果计算 ====================

  </div>

  </div>

  </div>

    <p>${c.insight}</p>
  </div>

    <h4>Other Archetypes · 其他角色类型</h4>

// ==================== 雷达图 ====================
function drawRadar(c, userAttr, attrLabels){
  const canvas=document.getElementById('radar');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const cx=W/2, cy=H/2, R=130;
  const attrs=['maternal','youthful','wisdom','protect','tsun','depend','heal','mystery'];
  const labels=['母性','幼态','智慧','保护','傲娇','依赖','治愈','神秘'];
  const n=attrs.length;

  ctx.clearRect(0,0,W,H);

  // 网格
  for(let lv=1;lv<=5;lv++){
    ctx.beginPath();
    for(let i=0;i<n;i++){
      const ang=Math.PI*2*i/n-Math.PI/2;
      const x=cx+R*lv/5*Math.cos(ang), y=cy+R*lv/5*Math.sin(ang);
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle='rgba(26,46,31,'+(lv===5?'.12':'.05')+')';
    ctx.lineWidth=lv===5?1:.5;
    ctx.stroke();
  }

  // 轴线
  for(let i=0;i<n;i++){
    const ang=Math.PI*2*i/n-Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+R*Math.cos(ang), cy+R*Math.sin(ang));
    ctx.strokeStyle='rgba(26,46,31,.08)';
    ctx.lineWidth=.5;
    ctx.stroke();
  }

  // 角色基准值(灰色)
  ctx.beginPath();
  for(let i=0;i<n;i++){
    const ang=Math.PI*2*i/n-Math.PI/2;
    const v=c[attrs[i]]/5;
    const x=cx+R*v*Math.cos(ang), y=cy+R*v*Math.sin(ang);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle='rgba(26,46,31,.06)';
  ctx.fill();
  ctx.strokeStyle='rgba(26,46,31,.25)';
  ctx.lineWidth=1.2;
  ctx.stroke();

  // 用户值(深色)
  ctx.beginPath();
  for(let i=0;i<n;i++){
    const ang=Math.PI*2*i/n-Math.PI/2;
    const v=Math.min(userAttr[attrs[i]]||c[attrs[i]],10)/10;
    const x=cx+R*v*Math.cos(ang), y=cy+R*v*Math.sin(ang);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle='rgba(196,164,90,.18)';
  ctx.fill();
  ctx.strokeStyle='rgba(26,46,31,.7)';
  ctx.lineWidth=1.6;
  ctx.stroke();

  // 用户值节点
  for(let i=0;i<n;i++){
    const ang=Math.PI*2*i/n-Math.PI/2;
    const v=Math.min(userAttr[attrs[i]]||c[attrs[i]],10)/10;
    const x=cx+R*v*Math.cos(ang), y=cy+R*v*Math.sin(ang);
    ctx.beginPath();
    ctx.arc(x,y,3.5,0,Math.PI*2);
    ctx.fillStyle='var(--ink)';
    ctx.fill();
    ctx.fillStyle='#1a2e1f';
    ctx.fill();
  }

  // 标签
  ctx.fillStyle='#1a2e1f';
  ctx.font='11px "Noto Sans SC",sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  for(let i=0;i<n;i++){
    const ang=Math.PI*2*i/n-Math.PI/2;
    const lx=cx+(R+24)*Math.cos(ang), ly=cy+(R+24)*Math.sin(ang);
    ctx.fillText(labels[i],lx,ly);
  }
}

// ==================== QR码 ====================
function drawQR(){
  const canvas=document.getElementById('qr-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const url='https://wcdpp.github.io/loli-mama-quiz/';
  const size=140; canvas.width=size; canvas.height=size;

  // 简易QR码生成(用格子模拟)
  const data=url.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const seed=url.length*131+data;
  function rnd(i,j){const x=Math.sin(i*12.9898+j*78.233+seed)*43758.5453;return x-Math.floor(x);}

  // 定位图案
  ctx.fillStyle='#1a2e1f';
  // 三个角的定位方块
  [[7,7],[7,size-28],[size-28,7]].forEach(([ox,oy])=>{
    ctx.fillRect(ox,oy,21,21);
    ctx.fillStyle='#f5f1e8'; ctx.fillRect(ox+3,oy+3,15,15);
    ctx.fillStyle='#1a2e1f'; ctx.fillRect(ox+6,oy+6,9,9);
  });

  // 数据区域
  const bs=4; // block size
  for(let r=0;r<size/bs;r++){
    for(let c=0;c<size/bs;c++){
      // 跳过定位图案区域
      if((r<8&&c<8)||(r<8&&c>size/bs-9)||(r>size/bs-9&&c<8)) continue;
      const v=rnd(r,c);
      if(v>.48&&v<.52) continue; // 留白
      if(v>.5){
        ctx.fillStyle='#1a2e1f';
        ctx.fillRect(c*bs,r*bs,bs,bs);
      }
    }
  }

  // 边框
  ctx.strokeStyle='#f5f1e8'; ctx.lineWidth=10;
  ctx.strokeRect(0,0,size,size);
  ctx.strokeStyle='#1a2e1f'; ctx.lineWidth=1;
  ctx.strokeRect(4,4,size-8,size-8);
}
